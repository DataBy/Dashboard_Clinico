services:
  api:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    env_file:
      - ./docker/backend/envs/.env
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped